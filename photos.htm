<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: Arial, Helvetica, sans-serif;
}

.modal {
  display: none;
  position: fixed;
  z-index: 1;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  overflow: auto;
  background-color: rgb(0,0,0);
  background-color: rgba(0,0,0,0.9);
}

.modal-content img {
  margin: auto;
  display: block;
  width: 80%;
  max-width: 1200px;
}


@-webkit-keyframes zoom {
  from {-webkit-transform:scale(0)} 
  to {-webkit-transform:scale(1)}
}

@keyframes zoom {
  from {transform:scale(0)} 
  to {transform:scale(1)}
}

.close {
  position: absolute;
  top: 15px;
  right: 35px;
  color: #f1f1f1;
  font-size: 40px;
  font-weight: bold;
  transition: 0.3s;
}

.close:hover,
.close:focus {
  color: #bbb;
  text-decoration: none;
  cursor: pointer;
}

.mySlides {
  display: none;
}

.cursor {
  cursor: pointer;
}

.prev,
.next {
  cursor: pointer;
  position: absolute;
  top: 50%;
  width: auto;
  padding: 16px;
  margin-top: -50px;
  color: white;
  font-weight: bold;
  font-size: 20px;
  border-radius: 0 3px 3px 0;
  user-select: none;
  -webkit-user-select: none;
}

.next {
  right: 0;
  border-radius: 3px 0 0 3px;
}

.prev:hover,
.next:hover {
  background-color: rgba(0, 0, 0, 0.8);
}

.row {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-around;
}

.column {
  flex: 1 0 200px;
  margin: 5px;
  box-sizing: border-box;
}

.photos-link {
  position: fixed;
  top: 10px;
  left: 10px;
  text-decoration: none;
  color: #0816e2;
  text-decoration: underline;
  font-weight: bold;
}

/* Style for the modal window */
.modalalbums {
  display: none; /* Hidden by default */
  position: fixed;
  z-index: 1; /* Ensure it appears on top of other content */
  padding: 10px;
  background-color: #aaa1a1e5;
  border: 3px solid #0f0f0f;
  width: 300px; /* Adjust width as needed */
  left: 10px;
  top: 10px;
  overflow: auto;
}

/* Style for the close button */
.close-modalalbums {
  position: absolute;
  top: 10px;
  right: 10px;
  text-decoration: none;
  color: #333;
  font-weight: bold;
}

</style>
</head>
<body>

  <a href="#modal" class="photos-link">Links to Public Google Photos Albums</a>

  <div id="albums" class="modalalbums">
    <h3>Google Photos Albums</h3>
    <ul>
      <li><a href="#">Album 1</a></li>
      <li><a href="#">Album 2</a></li>
      <li><a href="#">Album 3</a></li>
    </ul>
    <span class="close cursor" onclick="closeModalAlbums()" style="color: black;">×</span>
  </div>
  


<h2 style="text-align:center">Some Photos</h2>

<div class="row">
  <!-- Images will be inserted here by the script -->
</div>

<div id="myModal" class="modal">
  <span class="close cursor" onclick="closeModal()">×</span>
  <div class="modal-content">
    <!-- Image slides will be inserted here by the script -->
    <a class="prev" onclick="plusSlides(-1)">❮</a>
    <a class="next" onclick="plusSlides(1)">❯</a>
  </div>
</div>

<!-- Your JavaScript goes here -->

</body>

<script>

var images = [];

var nImages = 6;
var iImage;
for (iImage = 1; iImage <= nImages; iImage++)
{
	images.push('images/img'+iImage+'.jpg');
}

// Get the 'row' and 'myModal' divs
var row = document.querySelector('.row');
var myModal = document.querySelector('#myModal');
var modalContent = document.querySelector('.modal-content');

// Loop through the images array
for (var i = 0; i < images.length; i++) {
  // Create a new 'column' div
  var column = document.createElement('div');
  column.className = 'column';

  // Create a new img element
  var img = document.createElement('img');
  img.src = images[i];
  img.style.width = '300px';
  img.className = 'hover-shadow cursor';
  
  // Use an IIFE to capture the value of i at each iteration
  (function(i) {
    img.onclick = function() {
      openModal();
      currentSlide(i);
    };
  })(i);

  // Append the img to the 'column' div
  column.appendChild(img);

  // Append the 'column' div to the 'row' div
  row.appendChild(column);

  // Create a new 'mySlides' div
  var mySlides = document.createElement('div');
  mySlides.className = 'mySlides';

  // Create a new 'numbertext' div
  var numbertext = document.createElement('div');
  numbertext.className = 'numbertext';
  numbertext.textContent = (i) + ' / ' + images.length;

  // Create a new img element
  var imgModal = document.createElement('img');
  imgModal.src = images[i];
  imgModal.style.width = '100%';

  // Append the 'numbertext' div and img to the 'mySlides' div
  mySlides.appendChild(numbertext);
  mySlides.appendChild(imgModal);

  // Append the 'mySlides' div to the 'modal-content' div
  modalContent.appendChild(mySlides);
}



function openModal() {
  document.getElementById('myModal').style.display = "block";
}

function closeModal() {
  document.getElementById('myModal').style.display = "none";
}

var slideIndex = 1;
showSlides(slideIndex);

function plusSlides(n) {
  showSlides(slideIndex += n);
}

function currentSlide(n) {
  showSlides(slideIndex = n);
}

function showSlides(n) {
  var i;
  var slides = document.getElementsByClassName("mySlides");
  if (n > slides.length) {slideIndex = 0}
  if (n < 0) {slideIndex = slides.length}
  for (i = 0; i < slides.length; i++) {
      slides[i].style.display = "none";
  }
  slides[slideIndex].style.display = "block";
}

// Code for the album modal window
// JavaScript for opening and closing the modal
const modal = document.getElementById("albums");
const link = document.querySelector(".photos-link");
const closeButton = document.querySelector(".close-modalalbums");

link.addEventListener("click", () => {
  modal.style.display = "block";
});

closeButton.addEventListener("click", () => {
  modal.style.display = "none";
});

function closeModalAlbums() {
  document.getElementById('albums').style.display = "none";
}

</script>

</body>
</html>
